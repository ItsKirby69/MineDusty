# distribution
block.minedusty-oxide-copper-conveyor.name = Copper Conveyor
block.minedusty-oxide-copper-conveyor.description = Transports items forward.
block.minedusty-copper-junction.name = Copper Junction
block.minedusty-copper-junction.description = Acts as a bridge for two crossing conveyor belts.
block.minedusty-copper-router.name = Copper Router
block.minedusty-copper-router.description = Distributes input items to 3 output directions equally.
block.minedusty-copper-overflow-gate.name = Copper Overflow Gate
block.minedusty-copper-overflow-gate.description = Only outputs items to the left and right if the front path is blocked.
block.minedusty-copper-underflow-gate.name = Copper Underflow Gate
block.minedusty-copper-underflow-gate.description = Opposite of an overflow gate. Outputs to the front if the left and right paths are blocked.
block.minedusty-copper-sorter.name = Copper Sorter
block.minedusty-copper-sorter.description = If an input item matches the selection, it passes forward. Otherwise, the item is outputted to the left and right.
block.minedusty-copper-inverted-sorter.name = Copper Inverted Sorter
block.minedusty-copper-inverted-sorter.description = Similar to a standard sorter, but outputs selected items to the sides instead.
block.minedusty-aqua-conduit.name = Aquamerium Conduit
block.minedusty-aqua-conduit.description = Transports liquids through the pipes.
block.minedusty-aqua-liquid-router.name = Aquamerium Router
block.minedusty-aqua-liquid-router.description = Distributes liquid to 3 output directions equally.
block.minedusty-aqua-liquid-junction.name = Aquamerium Junction
block.minedusty-aqua-liquid-junction.description = A liquid bridge for two crossing pipelines.
block.minedusty-aquamerium-conveyor.name = Aquamerium Conveyor
block.minedusty-aquamerium-conveyor.description = Transports items forward. Faster than a standard conveyor.

# power
block.minedusty-salt-battery.name = Salt Battery
block.minedusty-salt-battery.description = Utilizes salt water to store power. Will lose stored power if insufficient salt water has been provided. [scarlet]Will explode if salt deposites aren't removed!
block.minedusty-salt-battery-large.name = Large Salt Battery
block.minedusty-salt-battery-large.description = Utilizes salt water to store power at a larger capacity. Will lose stored power if insufficient salt water has been provided. [scarlet]Will explode if salt deposites aren't removed!
block.minedusty-solar-panel.name = Solar Panel
block.minedusty-solar-panel.description = Provides a small amount of power from the sun.
block.minedusty-large-solar-panel.name = Large Solar Panel
block.minedusty-large-solar-panel.description = Provides a small amount of power from the sun. At larger size comes larger source of power.
block.minedusty-geothermal-generator.name = Geothermal Generator
block.minedusty-geothermal-generator.description = Utilizes hot locations to generate power. [scarlet]Melts down on more temperate locations! Removal of slag to subside this effect.[]
block.minedusty-large-geothermal-generator.name = Large Geothermal Generator
block.minedusty-large-geothermal-generator.description = Larger variant of the geothermal generator. Has higher heat capacity allowing for increased energy produciton. [scarlet]Melts down on more temperate locations! Removal of slag to subside this effect.[]
block.minedusty-carbonic-combustor.name = Carbonic Combustor
block.minedusty-carbonic-combustor.description = Burns flammable resources to produce power.
block.minedusty-power-pylon.name = Power Pylon
block.minedusty-power-pylon.description = A power node variation from Serpulo tech. Reduced connections for increased distances. Has the capability to be placed on water, but reduces some distance.
block.minedusty-power-hub.name = Power Hub
block.minedusty-power-hub.description = Makes up the lack of connections from a power pylon. Uses much more resources.
block.minedusty-electric-furnace.name = Electric Furnace
block.minedusty-electric-furnace.description = Provides Thermal Power to surrounding frosted blocks using power. Max heating power apply to adjacent blocks, falling off every 2 blocks afterwards.
block.minedusty-solid-furnace.name = Solid Furnace
block.minedusty-solid-furnace.description = Generates Thermal Power to surrounding frosted blocks with burnable solids. Max heating power apply to adjacent blocks, falling off every 2 blocks afterwards.

# defence
block.minedusty-oxide-copper-wall.name = Oxide Copper Wall
block.minedusty-oxide-copper-wall.description = Protects structures from enemy projectiles. Oxidizes as decoration.
block.minedusty-oxide-copper-wall-large.name = Large Oxide Copper Wall
block.minedusty-oxide-copper-wall-large.description = Protects structures from enemy projectiles. Oxidizes as decoration.
block.minedusty-chlorophyte-wall.name = Chlorophyte Wall
block.minedusty-chlorophyte-wall.description = Protects structures from enemy projectiles. Heals itself in pulses after a moment of being hit.
block.minedusty-chlorophyte-wall-large.name = Large Chlorophyte Wall
block.minedusty-chlorophyte-wall-large.description = Protects structures from enemy projectiles. Heals itself in pulses after a moment of being hit.
block.minedusty-aquamerium-wall.name = Aquamerium Wall
block.minedusty-aquamerium-wall.description = Protects structures from enemy projectiles.
block.minedusty-aquamerium-wall-large.name = Large Aquamerium Wall
block.minedusty-aquamerium-wall-large.description = Protects structures from enemy projectiles.
block.minedusty-aquamerium-wall-huge.name = Huge Aquamerium Wall
block.minedusty-aquamerium-wall-huge.description = Protects structures from enemy projectiles. Large size completely negates accumulation of frost.
block.minedusty-silicon-wall-large.name = Large Silicon Wall
block.minedusty-silicon-wall-large.description = Protects structures from enemy projectiles. Absorbs lasers and electric arcs.
block.minedusty-crystal-wall.name = Crystal Wall
block.minedusty-crystal-wall.description = Protects structures from enemy projectiles, reflecting most bullets upon impact.
block.minedusty-crystal-wall-large.name = Large Crystal Wall
block.minedusty-crystal-wall-large.description = Protects structures from enemy projectiles, reflecting most bullets upon impact.

# turrets
block.minedusty-sandspitter.name = Sand Spitter
block.minedusty-sandspitter.description = Shoots a spread of particles at enemies, slightly pushing them back.
block.minedusty-sandhammer.name = Sand Hammer
block.minedusty-sandhammer.description = Shoots a massive spread of particles at enemies, pushing them back with considerable force.
block.minedusty-sleet.name = Sleet
block.minedusty-sleet.description = Fires small fragmenting pellets at enemies from afar. Hits hard.
block.minedusty-pellucid.name = Pellucid
block.minedusty-pellucid.description = Fires a burst of piercing bullets at enemies.
block.minedusty-cascade.name = Cascade
block.minedusty-cascade.description = Fires a burst of flak clumps to enemy airraft.
block.minedusty-volt.name = Volt
block.minedusty-volt.description = Fires a streak of piercing laser beams. Deals much more damage to wet enemies.
block.minedusty-spout.name = Spout
block.minedusty-spout.description = Sprays a given liquid at enemies. Applying effects depending on liquid provided.
block.minedusty-pistil.name = Pistil
block.minedusty-pistil.description = Consumes power and Bio Sludge and shoots an energy orb which pierces and homes towards enemies.
block.minedusty-buoy-driver.name = Buoy Driver
block.minedusty-buoy-driver.description = A payload transport structure. Used in water related situations.

# MISC STUFF
# Tutorial messages
vs.insuff = [scarlet]??? Error ???[]\n[scarlet]??? Insufficient resources to commence tutorial module. ???[]
vs.welcome = Welcome to [#7ED633]Theia[]
vs.tut-state = Once again, you are fighting against the [scarlet]Crux[].\
    \nThis time, for a battle of resources to control the planet for interplanetary dominance.
vs.tut-carbon1 = Unlike [#7d4dff]Serpulo[], certain resources here have been affected by [accent]major environmental factors[].\
    \nFortunately, tech has been [accent]reconstructed[] from [#7d4dff]Serpulo[]\
    \nbringing more optimal use for this new environment.
vs.tut-carbon2 = :tree: Research the [accent]Carbonic Concentrator[] \uC354 and feed it [accent]Coal[] :coal: to obtain carbon-rich [accent]Carbonic Waste[] \uC353
vs.tut-carbon3 = Carbonic waste is a crucial resource for tech on [#7ED633]Theia[].\
    \nResearch the [accent]Carbonic Press[] \uC355 and feed it to obtain [accent]Graphite[] :graphite:
vs.tut-chloro = New resource identified as [accent]Chlorophyte[] \uC351 may prove to be useful. Properties show promise :tree:.
vs.alerted = [accent]Attention, your presence has been picked up by the [scarlet]Crux[accent]. Prepare for troops being sent your way.
vs.naval = [accent]Deeper scans reveal naval reinforcements arriving later. A wave will begin soon.[]

#@gz.zone3 beginWaves
bs.intro = This sector neighbors [scarlet]Crux[] outposts.\nThere are a few machines to research to keep up with the waves.
bs.tut-silica1 = :tree: Research and utilize the [accent]Crystal Bore[] \uC35B to obtain [accent]Silica dust[] \uC361 from crystals.
bs.tut-silica2 = :tree: Research the [accent]Silica Forge[] \uC356 and feed it Silica dust and Carbonic Waste to obtain [accent]Silicon[] :silicon:
bs.tut-silica3 = Both [accent]Silicon[] and [accent]Silica dust[] have their uses in defensive blocks.\
    \nSilicon will be important for research towards more complex machines.
bs.incoming = [accent]Incoming waves soon. Be prepared.
bs.nextwave = [accent]Get ready on all fronts as the enemy will not hesitate to overwhelm you.

tl.wavewarn = [accent]Major readings of enemy troops incoming. The first fleet arriving north.
tl.prepare = [accent]Supporting troops will arrive in later waves down south.

se.tut-salt1 = Salt can be utilized by the [accent]Salinator[] \uC35C with water to create [accent]Salt Water[] \uC357.
se.tut-salt2 = Useful for its corrosion properties when sprayed, but has better use in [accent]Batteries[] \uC35D.
se.tut-salt3 = Storing sizable amounts of energy, [accent]Salt Batteries[] require constant flow \
    \nof salt water or it loses the stored energy.
se.tut-salt4 = Batteries will build up [accent]Salt[] :salt: which requires removal \
    \nto prevent [accent]overheat[] and at last, an [red]explosion[].
se.tut-salt5 = [accent]Flashing[] signals on the battery will indicate rising problems.
se.incoming = [accent]Enemies approaching shortly. Beware of airborne fleets.

lc.intro1 = [accent]Overtake this sector's established [scarlet]Crux[] outpost. \
    \n[accent]Beware of incoming support waves sent to flank your core.

ff.tut1 = In cold weather, defense blocks may accumulate [#cccaff]frost[] over time. \
    \nFully [#cccaff]frosted blocks[] \uC362 will take [red]damage over time[], also taking [red]significantly more damage[].
ff.tut2 = [#cccaff]Frosted blocks[] \uC362 will naturally melt in normal weather or using thermal-producing \
    \nblocks such as the [accent]Electric[] \uC35F or [accent]Solid Furnaces[] \uC360. \
    \n[lightgray](That also means liquid pipes with slag!)[]
ff.tut3 = Maximum thermal power is given to adjacent blocks [lightgray](in a square)[]. \
    \nThermal power falls off by 1 every 2 blocks of orthogonal distance.
ff.tut4 = The menders established are temporarily used to combat the cold. \
    \n[accent]Prepare for enemies coming.[]

gp.sus = [accent]Readings detect a new and approaching enemy faction.[]\
    \n[accent]If scans are valid, recent disturbances made may have provoked this new\
    \n[accent]faction out of hiding from deep within the forests of [#7ED633]Theia[accent].
gp.wave = [accent]Becareful of flanks and prepare for fleets coming from North.

