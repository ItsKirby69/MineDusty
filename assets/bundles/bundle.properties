# sectors
sector.minedusty-verdantSpills.name = Verdant Spills
sector.minedusty-verdantSpills.description = A favourable beginning due to its geographically advantegous sector being positioned between lightly guarded sectors. Establish ground and survive the alerted waves.
sector.minedusty-basalticShore.name = Basaltic Shore
sector.minedusty-basalticShore.description = Near the guarded Crux outpost at the north. Expand your base here and defend against waves of crux retaliation fleets.
sector.minedusty-lushCorridors.name = Lush Corridors
sector.minedusty-lushCorridors.description = A defended region near the southern shoreline of [gold]Lake Ichor[]. Survive the waves to take over this post. Beware of the Crux supplying troops to attack you.
sector.minedusty-thicketValley.name = Thicket Valley
sector.minedusty-thicketValley.description = A fairly dense greenery with minimal resources. Radar readings detect an ominous stationary presence from a neighbouring sector.
sector.minedusty-tropicalLake.name = Tropical Lake
sector.minedusty-tropicalLake.description = Highly sought after region active with crux fleets. Rich in crucial materials and geological activity.
sector.minedusty-grassyPlains.name = Grassy Plains
sector.minedusty-grassyPlains.description = Wide and full of lushious grass. Radar scans reveal a new enemy. Transportation of external resources is available for this sector.
sector.minedusty-sandyEminence.name = Sandy Eminence
sector.minedusty-sandyEminence.description = Coast of a large desert with lack of greenery.
sector.minedusty-frostedFault.name = Frosted Fault
sector.minedusty-frostedFault.description = The temperatures of the southern regions are extreme enough causing environmental weathers to frost your defenses. Utilize heaters and geothermal activity to protect base integrity.

